# GTA-Link offline tracklet stitching (notebook §11d.5), run as its own pipeline stage
# right after `track`. Uses its own sports-OSNet (fetched from Hugging Face), independent of
# the prtreid `reid` module so the GSR downstream (team/role/jersey) is unaffected.
#
# Hyperparameters = the per-tracker tuned optima for the BoT-SORT · SOF variant
# (gta_per_tracker_optima.json["bot_sort_sof"], tuned on the valid split in the oracle
# notebook and applied on the test pass in yolov11-bot-sort-cmc.ipynb §11d.5):
#   {appearance_thresh: 0.25, spatial_thresh: 150, min_tracklet_len: 20,
#    ema_alpha: 0.9, linkage: average}
# With these, BoT-SORT · SOF improved from HOTA 0.6687 (raw) to 0.6947 (GTA) on GSR test.
_target_: sn_gamestate.track.gta_link_api.GTALink
cfg:
  osnet_weights: ${hf:${hf_weights_repo},sports_model.pth.tar-60,osnet_x1_0_sports.pt}
  fp16: true
  appearance_thresh: 0.25   # agglomerative merge cutoff on cosine distance
  spatial_thresh: 150       # px centre-gap gate, scaled by sqrt(frame gap)  (tuned; default was 60)
  min_tracklet_len: 20      # tracklets shorter than this are not merged     (tuned; default was 5)
  ema_alpha: 0.9            # appearance EMA over a tracklet's detections
  linkage: average
  batch_size: 64
